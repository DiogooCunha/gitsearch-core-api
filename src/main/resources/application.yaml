spring:
  application:
    name: gitsearch-core-api
  jackson:
    property-naming-strategy: SNAKE_CASE
    deserialization:
      fail-on-unknown-properties: false
  banner:
    location: banner.txt
server:
  servlet:
    context-path: /api/gitsearch/
    encoding:
      charset: UTF-8
      enabled: true
  port: 5555